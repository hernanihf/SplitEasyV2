# golangci-lint v2 config. Defaults already enable errcheck, govet,
# ineffassign, staticcheck and unused; we add a couple of useful extras.
version: "2"
run:
  timeout: 3m
linters:
  enable:
    - misspell
    - unconvert
    - gosec
    - gocritic
  settings:
    errcheck:
      # Closing a reader in a defer can't be handled meaningfully (nothing left
      # to do with the error at that point), so it stays excluded. json.Encode
      # to a ResponseWriter used to be excluded too, but every call site now
      # goes through writeJSON, which checks and logs the error itself.
      exclude-functions:
        - (io.ReadCloser).Close
        - (mime/multipart.File).Close
    gosec:
      # G104 (unhandled errors) overlaps with errcheck, which already owns that
      # concern with the targeted exclusions above.
      excludes:
        - G104
