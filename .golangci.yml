# golangci-lint v2 config. Defaults already enable errcheck, govet,
# ineffassign, staticcheck and unused; we add a couple of useful extras.
version: "2"
run:
  timeout: 3m
linters:
  enable:
    - misspell
    - unconvert
  settings:
    errcheck:
      # These errors are not actionable: writing JSON to an http.ResponseWriter
      # (headers already sent) and closing a reader in a defer. Excluding them
      # keeps errcheck focused on errors that actually matter.
      exclude-functions:
        - (*encoding/json.Encoder).Encode
        - (io.ReadCloser).Close
        - (mime/multipart.File).Close
