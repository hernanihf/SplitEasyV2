basePath: /api/v1
definitions:
  domain.ActivityEvent:
    properties:
      actor_id:
        type: integer
      actor_name:
        type: string
      amount:
        description: cents
        type: integer
      date:
        type: string
      group_emoji:
        type: string
      group_id:
        type: integer
      group_name:
        type: string
      id:
        description: |-
          ID is the underlying expense's or settlement's id (whichever Type
          says this event is), for opening the same detail view group history
          rows link to.
        type: integer
      title:
        type: string
      type:
        description: '"expense" | "settlement"'
        type: string
      your_share:
        description: cents
        type: integer
    type: object
  domain.Debt:
    properties:
      amount:
        description: cents
        type: integer
      from_user_id:
        type: integer
      to_user_id:
        type: integer
    type: object
  domain.Expense:
    properties:
      amount:
        description: cents
        type: integer
      created_at:
        type: string
      description:
        type: string
      group_id:
        type: integer
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/domain.ExpenseItem'
        type: array
      paid_by:
        allOf:
        - $ref: '#/definitions/domain.User'
        description: Relationships
      paid_by_id:
        type: integer
      splits:
        items:
          $ref: '#/definitions/domain.ExpenseSplit'
        type: array
      updated_at:
        type: string
    type: object
  domain.ExpenseItem:
    properties:
      amount:
        description: cents
        type: integer
      description:
        type: string
      expense_id:
        type: integer
      id:
        type: integer
      users:
        description: Members this item is split among (equally).
        items:
          $ref: '#/definitions/domain.User'
        type: array
    type: object
  domain.ExpenseSplit:
    properties:
      amount:
        description: cents
        type: integer
      created_at:
        type: string
      expense_id:
        type: integer
      id:
        type: integer
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/domain.User'
        description: Relationships
      user_id:
        type: integer
    type: object
  domain.Group:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      emoji:
        type: string
      expenses:
        items:
          $ref: '#/definitions/domain.Expense'
        type: array
      id:
        type: integer
      members:
        description: Relationships
        items:
          $ref: '#/definitions/domain.User'
        type: array
      name:
        type: string
      updated_at:
        type: string
    type: object
  domain.GroupSummary:
    properties:
      emoji:
        type: string
      id:
        type: integer
      members_count:
        type: integer
      name:
        type: string
      your_balance:
        description: cents
        type: integer
    type: object
  domain.HomeSummary:
    properties:
      groups:
        items:
          $ref: '#/definitions/domain.GroupSummary'
        type: array
      overall:
        $ref: '#/definitions/domain.OverallBalance'
    type: object
  domain.OverallBalance:
    properties:
      net:
        description: cents
        type: integer
      owe:
        description: cents
        type: integer
      owed:
        description: cents
        type: integer
    type: object
  domain.ReceiptItem:
    properties:
      description:
        type: string
      price:
        type: number
    type: object
  domain.ReceiptScan:
    properties:
      date:
        type: string
      items:
        items:
          $ref: '#/definitions/domain.ReceiptItem'
        type: array
      merchant_name:
        type: string
      total_amount:
        type: number
    type: object
  domain.Settlement:
    properties:
      amount:
        description: cents
        type: integer
      created_at:
        type: string
      from_user:
        allOf:
        - $ref: '#/definitions/domain.User'
        description: Relationships
      from_user_id:
        type: integer
      group_id:
        type: integer
      id:
        type: integer
      to_user:
        $ref: '#/definitions/domain.User'
      to_user_id:
        type: integer
    type: object
  domain.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  handler.AddExpenseRequest:
    properties:
      amount:
        example: 12050
        type: integer
      description:
        example: Dinner
        type: string
      group_id:
        example: 1
        type: integer
      items:
        items:
          $ref: '#/definitions/handler.ItemInputRequest'
        type: array
      paid_by_id:
        example: 1
        type: integer
      split_method:
        enum:
        - equal
        - percentage
        - fixed
        - shares
        example: equal
        type: string
      splits:
        items:
          $ref: '#/definitions/handler.SplitInputRequest'
        type: array
    type: object
  handler.CreateGroupRequest:
    properties:
      emoji:
        example: "\U0001F3D4️"
        type: string
      name:
        example: Trip to Paris
        type: string
    type: object
  handler.InviteResponse:
    properties:
      token:
        type: string
      url:
        type: string
    type: object
  handler.ItemInputRequest:
    properties:
      amount:
        example: 1500
        type: integer
      description:
        example: Burger
        type: string
      user_ids:
        items:
          type: integer
        type: array
    type: object
  handler.JoinGroupRequest:
    properties:
      token:
        example: a1b2c3d4...
        type: string
    type: object
  handler.LogoutRequest:
    properties:
      refresh_token:
        type: string
    type: object
  handler.RefreshRequest:
    properties:
      refresh_token:
        type: string
    type: object
  handler.SettleDebtRequest:
    properties:
      amount:
        example: 5000
        type: integer
      from_user_id:
        example: 2
        type: integer
      to_user_id:
        example: 1
        type: integer
    type: object
  handler.SplitInputRequest:
    properties:
      user_id:
        example: 2
        type: integer
      value:
        example: 50
        type: number
    type: object
  handler.TokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  handler.UpdateExpenseRequest:
    properties:
      amount:
        example: 12050
        type: integer
      description:
        example: Dinner
        type: string
      items:
        items:
          $ref: '#/definitions/handler.ItemInputRequest'
        type: array
      paid_by_id:
        example: 1
        type: integer
      split_method:
        enum:
        - equal
        - percentage
        - fixed
        - shares
        example: equal
        type: string
      splits:
        items:
          $ref: '#/definitions/handler.SplitInputRequest'
        type: array
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API server for SplitEasy app (Splitwise style expense sharing).
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: SplitEasy API
  version: "1.0"
paths:
  /activity:
    get:
      description: Returns recent expenses and settlements across the user's groups,
        newest first.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.ActivityEvent'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: Activity feed
      tags:
      - summary
  /auth/google/callback:
    get:
      description: Handles the callback from Google OAuth2, exchanges authorization
        code for a session, then redirects to the frontend with the access and refresh
        tokens in the URL fragment (#access_token=...&refresh_token=...). The fragment
        is never sent to the frontend server, so neither token appears in access logs,
        CDN logs, or Referer headers.
      parameters:
      - description: OAuth state validation
        in: query
        name: state
        required: true
        type: string
      - description: Authorization code
        in: query
        name: code
        required: true
        type: string
      responses:
        "307":
          description: Temporary Redirect to FRONTEND_REDIRECT_URL#access_token=...&refresh_token=...
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Handle Google Login Callback
      tags:
      - auth
  /auth/google/login:
    get:
      description: Redirects client to Google OAuth2 consent page.
      responses:
        "307":
          description: Temporary Redirect to Google OAuth
      summary: Redirect to Google Login URL
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes a refresh token so it can no longer be exchanged for a
        new session. Doesn't require a valid access token — a client whose access
        token has already expired still needs to be able to revoke its refresh token.
      parameters:
      - description: Refresh token to revoke
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.LogoutRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            type: string
      summary: Log out
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a valid, unused refresh token for a new access token
        and a new refresh token (the old refresh token stops working, whether or not
        this call succeeds).
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TokenResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Refresh a session
      tags:
      - auth
  /expenses:
    post:
      consumes:
      - application/json
      description: Adds a new expense to a group and splits it. split_method can be
        "equal" (default; splits among all members, or the given subset), "percentage"
        (splits values must add up to 100), "fixed" (splits values must add up to
        amount), or "shares" (splits proportionally to relative weights).
      parameters:
      - description: Expense Info
        in: body
        name: expense
        required: true
        schema:
          $ref: '#/definitions/handler.AddExpenseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Expense'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: Add an expense
      tags:
      - expenses
  /expenses/{id}:
    delete:
      description: Soft-deletes an expense. Only the payer or a split participant
        may delete it.
      parameters:
      - description: Expense ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: Delete an expense
      tags:
      - expenses
    get:
      description: Retrieves a single expense by id. Any member of the expense's group
        may view it — unlike edit/delete, this isn't limited to the payer or split
        participants.
      parameters:
      - description: Expense ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Expense'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: Get an expense
      tags:
      - expenses
    put:
      consumes:
      - application/json
      description: Replaces an expense's payer, description, amount, split, and items.
        Only the current payer or a current split participant may edit it.
      parameters:
      - description: Expense ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated expense info
        in: body
        name: expense
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateExpenseRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Expense'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
      security:
      - JWT: []
      summary: Edit an expense
      tags:
      - expenses
  /groups:
    get:
      description: Retrieves all groups the authenticated user is a member of.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Group'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: List groups for the authenticated user
      tags:
      - groups
    post:
      consumes:
      - application/json
      description: Creates a new group for sharing expenses. The authenticated user
        becomes its creator and first member.
      parameters:
      - description: Group Info
        in: body
        name: group
        required: true
        schema:
          $ref: '#/definitions/handler.CreateGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Group'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: Create a group
      tags:
      - groups
  /groups/{groupId}/expenses:
    get:
      description: Retrieves list of expenses for a specific group.
      parameters:
      - description: Group ID
        in: path
        name: groupId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Expense'
            type: array
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: Get expenses of a group
      tags:
      - expenses
  /groups/{id}:
    get:
      description: Retrieves a group by ID.
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Group'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
      security:
      - JWT: []
      summary: Get a group
      tags:
      - groups
  /groups/{id}/balances:
    get:
      description: Calculates the debts within a group to settle accounts.
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Debt'
            type: array
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: Get balances/debts of a group
      tags:
      - groups
  /groups/{id}/invite:
    get:
      description: Returns the share token and a join link for the group. Only group
        members can request it.
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.InviteResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: Get a group's invite link
      tags:
      - groups
  /groups/{id}/settlements:
    get:
      description: Returns every recorded payment in the group for the unified history
        view.
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Settlement'
            type: array
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: List a group's settlements
      tags:
      - groups
    post:
      consumes:
      - application/json
      description: Records a payment between two group members, reducing their outstanding
        balance.
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      - description: Settlement Info
        in: body
        name: settlement
        required: true
        schema:
          $ref: '#/definitions/handler.SettleDebtRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Settlement'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: Settle a debt
      tags:
      - groups
  /groups/join:
    post:
      consumes:
      - application/json
      description: Adds the authenticated user to the group identified by the invite
        token. Idempotent.
      parameters:
      - description: Invite token
        in: body
        name: invite
        required: true
        schema:
          $ref: '#/definitions/handler.JoinGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Group'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - JWT: []
      summary: Join a group via invite token
      tags:
      - groups
  /home:
    get:
      description: Returns the authenticated user's overall balance and per-group
        net balances.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.HomeSummary'
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: Home summary
      tags:
      - summary
  /receipts/scan:
    post:
      consumes:
      - multipart/form-data
      description: Parses a photographed or scanned receipt/ticket/invoice using AI
        and returns the extracted merchant, date, total and line items, for prefilling
        a new expense. Accepts both images and PDFs.
      parameters:
      - description: Receipt file (jpeg, png, webp, gif or pdf)
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.ReceiptScan'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "429":
          description: Too Many Requests
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: Scan a receipt image or PDF
      tags:
      - expenses
  /settlements/{id}:
    delete:
      description: Soft-deletes a recorded payment. Only the settlement's from_user_id
        or to_user_id may delete it — not just any group member.
      parameters:
      - description: Settlement ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - JWT: []
      summary: Delete a settlement
      tags:
      - groups
  /users/me:
    get:
      description: Returns the profile of the currently authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.User'
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
      security:
      - JWT: []
      summary: Get the authenticated user
      tags:
      - users
securityDefinitions:
  JWT:
    description: Type "Bearer <your-jwt-token>" to authenticate.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
